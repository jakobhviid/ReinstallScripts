# Speaker EQ for ThinkPad X1 Carbon Gen 13
# Hybrid: calibrated bass from DMIC measurement + manual high-end correction
# Measurement showed speakers are very weak below 200 Hz and have a peak around 500-1000 Hz
# Generated: 2026-04-14

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Internal Speakers"
            media.name        = "Internal Speakers"
            filter.graph = {
                nodes = [
                    {
                        type  = builtin
                        name  = preamp1
                        label = bq_lowshelf
                        control = {
                            # Preamp part 1: +8 dB across all frequencies
                            "Freq"  = 20000.0
                            "Q"     = 0.7
                            "Gain"  = 8.0
                        }
                    }
                    {
                        type  = builtin
                        name  = preamp2
                        label = bq_highshelf
                        control = {
                            # Preamp part 2: +8 dB across all frequencies
                            "Freq"  = 20.0
                            "Q"     = 0.7
                            "Gain"  = 8.0
                        }
                    }
                    {
                        type  = builtin
                        name  = preamp3
                        label = bq_lowshelf
                        control = {
                            # Preamp part 3: +8 dB more
                            "Freq"  = 20000.0
                            "Q"     = 0.7
                            "Gain"  = 8.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band1
                        label = bq_lowshelf
                        control = {
                            # Measured: bass ~17 dB below mids. Heavy low shelf boost.
                            "Freq"  = 250.0
                            "Q"     = 0.5
                            "Gain"  = 10.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band2
                        label = bq_peaking
                        control = {
                            # Measured: 125 Hz is the weakest point
                            "Freq"  = 120.0
                            "Q"     = 0.7
                            "Gain"  = 6.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band3
                        label = bq_peaking
                        control = {
                            # Fill the 250 Hz gap between bass boost and mids
                            "Freq"  = 250.0
                            "Q"     = 1.0
                            "Gain"  = 3.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band4
                        label = bq_peaking
                        control = {
                            # Measured: 500-1000 Hz peaks — this is the "tin can" resonance
                            # Cut it to reduce the hollow/tinny character
                            "Freq"  = 700.0
                            "Q"     = 0.8
                            "Gain"  = -4.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band5
                        label = bq_peaking
                        control = {
                            # 1 kHz is the loudest point — pull down to balance
                            "Freq"  = 1000.0
                            "Q"     = 1.2
                            "Gain"  = -2.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band6
                        label = bq_peaking
                        control = {
                            # Mild presence cut — reduces harshness
                            "Freq"  = 2500.0
                            "Q"     = 1.5
                            "Gain"  = -3.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band7
                        label = bq_highshelf
                        control = {
                            # Gentle high shelf rolloff
                            "Freq"  = 8000.0
                            "Q"     = 0.7
                            "Gain"  = -2.0
                        }
                    }
                ]
                links = [
                    { output = "preamp1:Out" input = "preamp2:In" }
                    { output = "preamp2:Out" input = "preamp3:In" }
                    { output = "preamp3:Out" input = "eq_band1:In" }
                    { output = "eq_band1:Out" input = "eq_band2:In" }
                    { output = "eq_band2:Out" input = "eq_band3:In" }
                    { output = "eq_band3:Out" input = "eq_band4:In" }
                    { output = "eq_band4:Out" input = "eq_band5:In" }
                    { output = "eq_band5:Out" input = "eq_band6:In" }
                    { output = "eq_band6:Out" input = "eq_band7:In" }
                ]
            }
            capture.props = {
                node.name   = "effect_input.speaker_eq"
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "effect_output.speaker_eq"
                node.target = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
