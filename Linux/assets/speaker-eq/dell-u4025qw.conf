# Monitor Speaker EQ — DELL U4025QW built-in speakers (Atlas, over HDMI/DP)
#
# Method: same as the thinkpad-x1carbon profile — a 50 Hz-20 kHz log sweep is played out the
# monitor speaker and recorded back, then the frequency response is analyzed.
# Measured with a RODE VideoMic NTG close-miked (~10 cm) at low volume so the
# little drivers stayed linear (they distort/get boxier when driven hard).
#
# Measured response (normalized to the 500-2000 Hz band = 0 dB):
#   - Broad mid-forward hump ~200 Hz-1 kHz, +3 to +7 dB, with resonant peaks
#     at 250 Hz (boxy) and 1 kHz (nasal)                    <- the main flaws
#   - Bass rolls off below ~120 Hz (100 Hz ~5 dB down)      <- tiny drivers
#   - Steep treble rolloff above ~2 kHz: -7 dB @ 3 kHz down to -18..-25 dB by
#     5-10 kHz                                               <- speakers are dull
#   (50 Hz reads high = mains hum, 16 kHz reads high = sweep-end artifact, and
#    the narrow 1.6/2.5 kHz notches are position-dependent comb filtering from
#    reflections — none of those are real EQ targets.)
#
# So this profile: cut the 250 Hz + 1 kHz resonances and the broad mid hump,
# add a touch of warmth at 120 Hz, and lift the treble to open up the dull top
# end (a realistic shelf, not an attempt to fill the -25 dB cliff, which would
# only add hiss/distortion). Digital makeup gain is +16 dB (2x +8 dB shelves);
# raise the two preamp Gain values for more, lower them if loud material starts
# to clip/distort. NOTE: this is DIGITAL gain — it has a hard ceiling at 0 dBFS,
# past which it just clips. For clean loudness beyond that, turn up the MONITOR's
# own volume (analog, after the digital path) — that's the real level control.
# Generated: 2026-07-23
#
# target-match: DELL U4025QW
#   The monitor's EDID name. `pwtune install` resolves this to the actual sink
#   node.name and fills in node.target below — that node.name differs per machine
#   (NVIDIA HDMI on the desktop, Intel DisplayPort-over-Thunderbolt on the laptop),
#   but the EDID name is the same wherever the monitor is plugged in, so one
#   profile is portable across both. If you deploy this file by hand, replace
#   __TARGET_SINK__ with your sink from `pactl list short sinks`.

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "DELL U4025QW Speakers (EQ)"
            media.name        = "DELL U4025QW Speakers (EQ)"
            filter.graph = {
                nodes = [
                    {
                        type  = builtin
                        name  = preamp1
                        label = bq_lowshelf
                        control = {
                            # Makeup gain part 1: +8 dB across all frequencies.
                            # HDMI is a digital line level, so keep total makeup
                            # moderate — too much clips the stream before the amp.
                            "Freq"  = 20000.0
                            "Q"     = 0.7
                            "Gain"  = 8.0
                        }
                    }
                    {
                        type  = builtin
                        name  = preamp2
                        label = bq_highshelf
                        control = {
                            # Makeup gain part 2: +8 dB across all frequencies
                            "Freq"  = 20.0
                            "Q"     = 0.7
                            "Gain"  = 8.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band1
                        label = bq_lowshelf
                        control = {
                            # Warmth: lift the body below 120 Hz to fill the dip
                            # around 100 Hz. Modest — the drivers can't reproduce
                            # <80 Hz, so a big boost would only add distortion.
                            "Freq"  = 120.0
                            "Q"     = 0.7
                            "Gain"  = 4.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band2
                        label = bq_peaking
                        control = {
                            # Cut the boxy cabinet resonance at 250 Hz
                            "Freq"  = 250.0
                            "Q"     = 1.2
                            "Gain"  = -5.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band3
                        label = bq_peaking
                        control = {
                            # Broad cut through the body of the mid hump so the
                            # 315-800 Hz region isn't forward/honky
                            "Freq"  = 450.0
                            "Q"     = 0.8
                            "Gain"  = -3.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band4
                        label = bq_peaking
                        control = {
                            # Cut the nasal resonance at 1 kHz
                            "Freq"  = 1000.0
                            "Q"     = 1.2
                            "Gain"  = -5.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band5
                        label = bq_peaking
                        control = {
                            # Presence/clarity — the upper mids are still alive
                            # here (~-7 dB) and recoverable, unlike the top octave
                            "Freq"  = 3200.0
                            "Q"     = 1.0
                            "Gain"  = 5.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band6
                        label = bq_highshelf
                        control = {
                            # Air / treble to counter the rolloff above ~2 kHz.
                            # Opposite of the ThinkPad profile, whose speakers
                            # were harsh and needed a rolloff instead.
                            "Freq"  = 5000.0
                            "Q"     = 0.7
                            "Gain"  = 7.0
                        }
                    }
                ]
                links = [
                    { output = "preamp1:Out" input = "preamp2:In" }
                    { output = "preamp2:Out" input = "eq_band1:In" }
                    { output = "eq_band1:Out" input = "eq_band2:In" }
                    { output = "eq_band2:Out" input = "eq_band3:In" }
                    { output = "eq_band3:Out" input = "eq_band4:In" }
                    { output = "eq_band4:Out" input = "eq_band5:In" }
                    { output = "eq_band5:Out" input = "eq_band6:In" }
                ]
            }
            capture.props = {
                node.name   = "effect_input.eq_dell_u4025qw"
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "effect_output.eq_dell_u4025qw"
                node.target = "__TARGET_SINK__"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
