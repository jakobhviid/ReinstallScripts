# Speaker EQ for ThinkPad X1 Carbon Gen 13 (and similar thin laptop speakers)
# Compensates for weak bass and 700 Hz "tin can" resonance.
# Deployed to ~/.config/pipewire/pipewire.conf.d/speaker-eq.conf

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Internal Speakers"
            media.name        = "Internal Speakers"
            filter.graph = {
                nodes = [
                    {
                        type  = builtin
                        name  = preamp
                        label = bq_highshelf
                        control = {
                            # Preamp: +6 dB overall volume boost
                            "Freq"  = 10.0
                            "Q"     = 1.0
                            "Gain"  = 6.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band1
                        label = bq_lowshelf
                        control = {
                            # Bass boost — measured 17 dB below mids
                            "Freq"  = 250.0
                            "Q"     = 0.5
                            "Gain"  = 10.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band2
                        label = bq_peaking
                        control = {
                            # Sub-bass fill — weakest point on these speakers
                            "Freq"  = 120.0
                            "Q"     = 0.7
                            "Gain"  = 6.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band3
                        label = bq_peaking
                        control = {
                            # Cut the "tin can" resonance
                            "Freq"  = 700.0
                            "Q"     = 0.8
                            "Gain"  = -4.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band4
                        label = bq_peaking
                        control = {
                            # Reduce harshness
                            "Freq"  = 2500.0
                            "Q"     = 1.5
                            "Gain"  = -3.0
                        }
                    }
                    {
                        type  = builtin
                        name  = eq_band5
                        label = bq_highshelf
                        control = {
                            # Gentle high rolloff
                            "Freq"  = 8000.0
                            "Q"     = 0.7
                            "Gain"  = -2.0
                        }
                    }
                ]
                links = [
                    { output = "preamp:Out" input = "eq_band1:In" }
                    { output = "eq_band1:Out" input = "eq_band2:In" }
                    { output = "eq_band2:Out" input = "eq_band3:In" }
                    { output = "eq_band3:Out" input = "eq_band4:In" }
                    { output = "eq_band4:Out" input = "eq_band5:In" }
                ]
            }
            capture.props = {
                node.name   = "effect_input.speaker_eq"
                media.class = Audio/Sink
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "effect_output.speaker_eq"
                node.target = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
