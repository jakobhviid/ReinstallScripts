# shared.conf — MANAGED by ReinstallScripts (`just ssh-config` on Mac + Linux;
# Linux also run_config_ssh). Source is shared/ssh-shared.conf; deployed
# verbatim to ~/.ssh/config.d/shared.conf, rewritten every run — edits here lost.
#
# Host inventory + home/away routing ONLY. Your agent config (IdentityAgent /
# ForwardAgent, e.g. the 1Password SSH agent) stays in your own ~/.ssh/config
# `Host *` block and is deliberately NOT managed here — it differs per machine.
#
# Routing: on the home LAN (this machine currently holds a 192.168.1.x address)
# connect DIRECT to the internal IPs; off-LAN, reach internal hosts through the
# eternium jump host (hviid.cloud, key-only auth). ssh keeps the FIRST value it
# sees for each option, so the on-LAN override blocks come before the defaults.
#
# CAVEAT: the on-LAN test only checks "do I hold a 192.168.1.x address" — a
# very common range. On a *different* network that also uses 192.168.1.0/24 it
# will false-positive and try a direct connection to a stranger's .2/.4/.6. If
# that ever bites, swap the exec for a probe of eternium specifically, e.g.
#   exec "nc -z -w1 192.168.1.4 22"   (needs netcat on the client)
#
# LAN test is portable: `ip` on Linux (desktops + servers), `ifconfig` fallback
# on macOS. No network round-trip, no extra dependencies.

# ── On-LAN overrides (apply only when a 192.168.1.x address is present) ──────
Match host eternium exec "{ ip -4 -o addr show 2>/dev/null || ifconfig 2>/dev/null; } | grep -qF 'inet 192.168.1.'"
    HostName 192.168.1.4
Match host helios,nous,pve exec "{ ip -4 -o addr show 2>/dev/null || ifconfig 2>/dev/null; } | grep -qF 'inet 192.168.1.'"
    ProxyJump none

# ── Defaults (off-LAN / fallback) ────────────────────────────────────────────
Host eternium
    HostName hviid.cloud
    User jakob

Host helios
    HostName 192.168.1.2
    User jakob
    ProxyJump eternium

Host nous
    HostName 192.168.1.6
    User jakob
    ProxyJump eternium

Host pve
    HostName 192.168.1.5
    User jakob
    ProxyJump eternium
